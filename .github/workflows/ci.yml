name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build:v1
      - run: npm run build:v2
      - run: npm run build:v3-old
      - run: npm run build:v3
      - run: npm run build:v4
      - run: npm run build:android
      - run: npm run build:android:v4
